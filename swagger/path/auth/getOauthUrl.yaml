tags:
  - Auth
summary: auth url
operationId: getOAuthUrl
description: generate auth url
security: []
parameters: []
responses: 
  '200':
    description: Successfully get Google OAuth url
    content: 
      application/json:
        schema:
          type: object
          required: 
            - status
            - message 
            - data
          properties:
            status: 
              type: integer
              example: 200
            message: 
              type: string
              example: Successfully get Google OAuth url
            data:
              type: object
              example: {
                url: "https://accounts.google.com/o/oauth2/v2/auth?scope=https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fuserinfo.email%20https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fuserinfo.profile&response_type=code&client_id=1081276669754-hu4hfdchnnrhdh1n95461h1rra71vnle.apps.googleusercontent.com&redirect_uri=http%3A%2F%2Flocalhost%3A4330%2Fconfirm-google-auth"
              }