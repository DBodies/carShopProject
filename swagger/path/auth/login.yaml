tags:
  - Auth
summary: Login
operationId: Login
description: 'Login user'
security: []
parameters: []
responses:
  '200':
    description: Successfully logged in
    content: 
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Logged in
            data: 
              type: object
              example: {
                accessToken: 'Access token'
              }
  '404':
    $ref: ../../components/responses/404.yaml
  '403':
    $ref: ../../components/responses/403.yaml
