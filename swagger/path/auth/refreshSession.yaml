tags:
  - Auth
summary: Refresh session
operationId: RefreshSession
description: 'Refresh session'
security: []
parameters: []
responses:
  '200':
    description: Successfully update a session
    content: 
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully update a session
            data: 
              type: object
              example: {
                accessToken: 'Session accessToken'
              }
  '401':
    $ref: ../../components/responses/401.yaml
