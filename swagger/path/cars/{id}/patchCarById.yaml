tags:
  - Cars
summary: Patch car by Id
operationId: patchCar
description: 'Updating a car'
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema: 
      type: string
      example: 'ford_focus_2018'
responses:
  '200':
    description: 'Car with id ${carId} was updated'
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message: 
              type: string
            data: 
              type: object
              $ref: '../../../components/schemas/patchCarByIdSchema.yaml'
  '401':
    $ref: '../../../components/responses/401.yaml'
  '404':
    $ref: '../../../components/responses/404.yaml'

