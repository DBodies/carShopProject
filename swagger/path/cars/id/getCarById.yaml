tags:
  - Car
summary: Get Car by id
operationId: getCar
description: 'Get car by id'
security: 
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema: 
      type: string
      example: 'ford_focus_2018'
responses: 
  '200': 
    description:  getting car by id'
    content: 
      application/json:
        schema:
          type: object
          required: 
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message: 
              type: string
              example: Successfully getting an car by id ford_focus_2018
            data: 
              type: object
              $ref: '../../../components/schemas/carByIdSchema.yaml'
  '401': 
    $ref: '../../../components/responses/401.yaml'